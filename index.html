
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تشخيص كاش ناس | Cash Clinic Luxury</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #003d33;
            --secondary: #d4af37; /* Gold */
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.85);
        }

        * { box-sizing: border-box; font-family: 'Noto Sans Arabic', sans-serif; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        body {
            background: radial-gradient(circle at top right, #004d40, #002520);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .header { position: absolute; top: 20px; right: 30px; }
        .header img { width: 130px; filter: brightness(0) invert(1); } /* Makes logo white for dark bg */

        #app {
            background: var(--glass);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 30px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .progress-container { margin-bottom: 30px; }
        .bar { height: 4px; background: rgba(0,0,0,0.1); border-radius: 10px; }
        .fill { height: 100%; background: var(--secondary); width: 0%; border-radius: 10px; box-shadow: 0 0 10px var(--secondary); }

        h2 { color: var(--primary); font-size: 1.6rem; margin-bottom: 25px; line-height: 1.4; }

        .option {
            background: white;
            border: 1.5px solid #d1d9d8;
            padding: 20px;
            margin-bottom: 12px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 1.1rem;
            color: var(--primary);
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .option:hover {
            border-color: var(--secondary);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            background: #fffdf7;
        }

        .option::after { content: '←'; font-size: 1.2rem; color: var(--secondary); opacity: 0; transition: 0.3s; }
        .option:hover::after { opacity: 1; transform: translateX(-5px); }

        .btn-main {
            background: var(--primary);
            color: white;
            padding: 18px 50px;
            border-radius: 50px;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .result-card { background: var(--primary); color: white; border-radius: 20px; padding: 30px; margin-top: 20px; }
        .gold-text { color: var(--secondary); font-weight: bold; font-size: 2rem; }

        .whatsapp {
            background: #25D366;
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 12px;
            display: inline-block;
            margin-top: 25px;
            font-weight: bold;
        }

        .hidden { display: none; }
        .fade { animation: fadeIn 0.6s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div class="header">
        <img src="logo.png" alt="Cash Clinic">
    </div>

    <div id="app" class="fade">
        <div id="intro">
            <h1 style="color: var(--primary);">تشخيص كاش ناس الفاخر</h1>
            <p style="color: #444;">مستشارك المالي الرقمي بانتظارك. هل أنت مستعد لتحديد مسارك؟</p>
            <button class="btn-main" onclick="start()">ابدأ الجلسة الآن</button>
        </div>

        <div id="quiz" class="hidden">
            <div class="progress-container">
                <div id="step-count" style="font-size: 0.8rem; margin-bottom: 5px; color: #666;"></div>
                <div class="bar"><div id="fill" class="fill"></div></div>
            </div>
            <h2 id="question"></h2>
            <div id="options"></div>
        </div>

        <div id="result" class="hidden fade">
            <div class="result-card">
                <p>بناءً على تحليلك المالي، الباقة الأنسب لك هي:</p>
                <div id="package" class="gold-text"></div>
            </div>
            <p id="desc" style="margin-top: 20px; color: #333; line-height: 1.7;"></p>
            <a id="wa" href="#" class="whatsapp">تحدث مع الخبير المالي</a>
        </div>
    </div>

    <script>
        const data = [
            { q: "ما هو شعورك الأول عند فتح تطبيق البنك؟", o: [ {t: "فخر واطمئنان", s:"A"}, {t: "توتر وترقب", s:"B"}, {t: "خوف وتجنب", s:"C"} ] },
            { q: "كيف تتعامل مع المصاريف المفاجئة (مثل تصليح سيارة)؟", o: [ {t: "لدي ميزانية مخصصة للطوارئ", s:"A"}, {t: "أعتمد على البطاقة الائتمانية", s:"B"}, {t: "أضطر للاقتراض من الأهل", s:"C"} ] },
            { q: "هل تلتزم بميزانية شهرية محددة؟", o: [ {t: "نعم، بدقة عالية", s:"A"}, {t: "أحياناً، ولكن غالباً ما أتجاوزها", s:"B"}, {t: "لا أستخدم ميزانية أبداً", s:"C"} ] },
            { q: "ما هي نسبة الديون من دخلك الشهري؟", o: [ {t: "أقل من 20%", s:"A"}, {t: "بين 30% إلى 50%", s:"B"}, {t: "أكثر من 50%", s:"C"} ] },
            { q: "هل تملك استثمارات تدر عليك دخلاً إضافياً؟", o: [ {t: "نعم، متنوعة", s:"A"}, {t: "أفكر في الأمر ولكن لم أبدأ", s:"B"}, {t: "لا أملك سيولة للاستثمار", s:"C"} ] },
            { q: "عند نهاية الشهر، كم يتبقى من راتبك؟", o: [ {t: "أكثر من 20%", s:"A"}, {t: "مبالغ بسيطة جداً", s:"B"}, {t: "ينفد الراتب قبل النهاية", s:"C"} ] },
            { q: "ما هو هدفك المالي الأكبر في الـ 12 شهراً القادمة؟", o: [ {t: "تنمية ثروتي الحالية", s:"A"}, {t: "تصفية ديوني بالكامل", s:"B"}, {t: "النجاة من العجز الشهري", s:"C"} ] }
        ];

        let idx = 0;
        let score = {A:0, B:0, C:0};

        function start() {
            document.getElementById('intro').classList.add('hidden');
            document.getElementById('quiz').classList.remove('hidden');
            render();
        }

        function render() {
            const q = data[idx];
            document.getElementById('question').innerText = q.q;
            document.getElementById('step-count').innerText = `السؤال ${idx+1} من ${data.length}`;
            document.getElementById('fill').style.width = ((idx/data.length)*100) + "%";
            
            const opts = document.getElementById('options');
            opts.innerHTML = '';
            q.o.forEach(item => {
                const d = document.createElement('div');
                d.className = 'option fade';
                d.innerText = item.t;
                d.onclick = () => { score[item.s]++; idx++; if(idx < data.length) render(); else finish(); };
                opts.appendChild(d);
            });
        }

        function finish() {
            document.getElementById('quiz').classList.add('hidden');
            document.getElementById('result').classList.remove('hidden');
            
            let res = score.A > 3 ? "باقة المرتاحين" : (score.B > score.C ? "باقة المديونين" : "باقة المعتفسين");
            let d = res === "باقة المرتاحين" ? "أنت في منطقة الأمان المالي. هدفنا هو تحويل مدخراتك إلى آلة استثمارية ذكية." : 
                    res === "باقة المديونين" ? "أنت تعاني من ضغوط الأقساط. خطتنا ستركز على السيطرة السريعة وإعادة الجدولة." : 
                    "أنت في مرحلة الطوارئ المالية. نحتاج إلى تدخل جراحي لإعادة تنظيم ميزانيتك من الصفر.";

            document.getElementById('package').innerText = res;
            document.getElementById('desc').innerText = d;
            document.getElementById('wa').href = `https://wa.me/965YOURNUMBER?text=انتهيت من تشخيص كاش ناس ونتيجتي: ${res}`;
        }
    </script>
</body>
</html>
